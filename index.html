<!DOCTYPE html>
<html lang="en">
<head>

<title>World Cup 2026 Sweepstakes</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; }
  body { min-height: 100vh; background: #0B1F15; color: #EFF5EE;
    font-family: 'Inter', system-ui, sans-serif;
    background-image:
      radial-gradient(ellipse 120% 60% at 50% -10%, #143A26 0%, transparent 60%),

  .wrap { max-width: 420px; width: 100%; text-align: center; }

  h1 { font-family: 'Anton', sans-serif; font-size: clamp(36px, 11vw, 60px);
    line-height: 0.95; text-transform: uppercase; margin: 8px 0 24px; }
  a.btn { display: block; font-family: 'Anton', sans-serif; text-transform: uppercase;
    letter-spacing: 0.06em; background: #D9A441; color: #14150E; text-decoration: none;
    border-radius: 12px; padding: 18px; font-size: 20px; margin-bottom: 12px; }
  a.btn.alt { background: #102A1C; color: #EFF5EE; border: 1px solid rgba(232,243,232,0.15); }
</style>
</head>
<body>
<div class="wrap">
  <div class="eyebrow">USA · Canada · Mexico 2026</div>
  <h1>The Sweepstakes</h1>
