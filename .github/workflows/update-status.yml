name: Update sweepstake status

# Runs daily at 06:00 UTC — that is 07:00 UK time during British Summer Time
# (in effect for the whole tournament, late Mar–late Oct). GitHub may start
# scheduled runs a few minutes late under load. "Run workflow" triggers it now.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-status
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Derive team status from live results
        run: node scripts/update-status.mjs
      - name: Commit if changed
        run: |
          git config user.name "sweepstake-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add status.json
          if git diff --cached --quiet; then
            echo "No status change."
          else
            git commit -m "chore: auto-update team status from live results"
            git push
          fi
